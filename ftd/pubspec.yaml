name: dms
description: Food Truck Driver — Delivery Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1
  path_provider: ^2.1.0

  # Location & background
  geolocator: ^11.0.0
  flutter_background_service: ^5.0.5

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.22

  # Permissions
  permission_handler: ^11.3.1

  # Network status
  connectivity_plus: ^6.0.3

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  drift_dev: ^2.18.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
